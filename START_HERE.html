<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="0; url=./index.html" />
    <title>Open My Vocab Lab</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f7fafb;
        color: #222326;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      main {
        width: min(520px, calc(100% - 32px));
        padding: 28px;
        border: 1px solid #d9e1e8;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 18px 50px rgba(31, 45, 61, 0.12);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 2rem;
        line-height: 1;
      }

      p {
        margin: 0 0 18px;
        color: #65707a;
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 8px;
        background: #1f8a84;
        color: #ffffff;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>My Vocab Lab</h1>
      <p>If the website does not open automatically, use this button.</p>
      <a href="./index.html">Open website</a>
    </main>
  </body>
</html>
